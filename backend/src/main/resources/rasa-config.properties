# ═══════════════════════════════════════════════════════════
#  Infora Backend Rasa NLP Integration Properties
# ═══════════════════════════════════════════════════════════
# Rasa is used for intent detection and entity extraction
# in the chatbot module. These properties configure the
# connection to the Rasa NLP server.

# ─── Rasa Server ───
rasa.server.url=http://localhost:5005
rasa.server.model-endpoint=/model/parse
rasa.server.webhook-endpoint=/webhooks/rest/webhook

# ─── Rasa Timeout (milliseconds) ───
rasa.server.connect-timeout=5000
rasa.server.read-timeout=10000

# ─── Supported Intents ───
# These are the intents the system should recognize:
# - news_query         : User asking for news (e.g., "accidents in Kalutara today")
# - service_guidance   : User asking for government service help
# - greeting           : User greeting (e.g., "hello", "ayubowan")
# - goodbye            : User saying goodbye
# - affirm             : User confirming (e.g., "yes", "ow")
# - deny               : User denying (e.g., "no", "naha")
# - next_step          : User asking for next step in guidance
# - language_switch    : User switching language preference
