# ═══════════════════════════════════════════════════════════
#  Infora Backend Development Profile
# ═══════════════════════════════════════════════════════════

# Overrides for local development

# ─── Server ───
server.port=8080

# ─── Firebase ───
firebase.service-account-key=src/main/resources/firebase-service-account.json

# ─── CORS (allow all origins in dev) ───
cors.allowed-origins=http://localhost:3000,http://localhost:8081,http://localhost:19006,http://localhost:19000

# ─── Logging (verbose in dev) ───
logging.level.com.infora.backend=DEBUG
logging.level.org.springframework.web=DEBUG

# ─── DevTools ───
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

