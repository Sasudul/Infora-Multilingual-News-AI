# ═══════════════════════════════════════════════════════════
#  Infora Backend — Application Properties
# ═══════════════════════════════════════════════════════════

# ─── Server ───
server.port=8080
spring.application.name=infora-backend

# ─── Firebase ───
# Path to your Firebase service account JSON key file.
# Download from: Firebase Console → Project Settings → Service Accounts → Generate New Private Key
# NEVER commit this file to version control!
firebase.service-account-key=src/main/resources/firebase-service-account.json

# ─── CORS ───
# Comma-separated list of allowed origins (Next.js dev, Expo dev)
cors.allowed-origins=http://localhost:3000,http://localhost:8081,http://localhost:19006

# ─── API Documentation (SpringDoc / Swagger) ───
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ─── Actuator ───
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ─── Logging ───
logging.level.root=INFO
logging.level.com.infora.backend=DEBUG
logging.level.com.google.firebase=WARN

# ─── Jackson (JSON serialization) ───
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
